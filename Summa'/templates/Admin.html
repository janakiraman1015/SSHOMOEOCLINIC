<!DOCTYPE html>
<html>
<head>

<title>Admin Login</title>

<style>

body{
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#6c5ce7;
}

.login{
background:white;
padding:40px;
border-radius:8px;
width:300px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
width:100%;
padding:10px;
background:#6c5ce7;
color:white;
border:none;
cursor:pointer;
}

/* Flash Message */

.flash-message {
    padding: 10px;
    margin: 10px 0;
    border-radius: 4px;
    font-family: Arial, sans-serif;
}
.flash-message.success {
    background-color: #6c5ce7;
    color: #6c5ce7;
    border: 1px solid #c3e6cb;
}
.flash-message.error {
    background-color: #f8d7da;
    color: #721c24;
    border: 1px solid #f5c6cb;
}

</style>

</head>

<body>


<form action="{{url_for('admin')}}" method="post">

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="flash-message {{ category }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <div class="login">

        <h2>Admin Login</h2>

        <input id="user" name="user" placeholder="Username" required>

        <input id="pass" name="password" type="password" placeholder="Password" required>

        <button type="submit">Login</button>

    </div>

</form>


<script>

    let flashMessage = document.querySelector(".flash-message");
    let msg = flashMessage.textContent;

    if (flashMessage) {
            // Hide after 3 seconds (3000 ms)
            setTimeout(() => {
                // Add fade-out effect
                flashMessage.style.transition = "opacity 0.5s ease";
                flashMessage.style.opacity = "0";
            }, 3000);
        }

</script>


</body>
</html>
